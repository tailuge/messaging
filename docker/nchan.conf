server {
    listen       8080;
    listen  [::]:8080;
    server_name  localhost;

    client_max_body_size 1m;
    client_body_buffer_size 64k;

    # Shared configuration (Metadata only, no CORS here to avoid duplication)
    add_header X-Server-Time $time_iso8601 always;
    add_header X-User-Agent $http_user_agent always;
    add_header X-Origin $http_origin always;
    add_header X-Client-Country $http_cf_ipcountry always;
    add_header Vary Origin always;

    # Health check endpoint
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        add_header X-Server-Time $time_iso8601 always;
        add_header X-User-Agent $http_user_agent always;
        add_header X-Origin $http_origin always;
        add_header X-Client-Country $http_cf_ipcountry always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
    }

    # Publisher endpoint table
    location ~ ^/publish/table/(?<tableId>\w+)$ {
        add_header X-Server-Time $time_iso8601 always;
        add_header X-User-Agent $http_user_agent always;
        add_header X-Origin $http_origin always;
        add_header X-Client-Country $http_cf_ipcountry always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        js_content nchan_meta.publish;
    }

    location ~ ^/internal/publish/table/(?<tableId>\w+)$ {
        internal;
        nchan_publisher;
        nchan_channel_id $tableId;
        nchan_message_buffer_length 2000;
        default_type application/json;
    }

    # Publisher endpoint lobby
    location ~ ^/publish/lobby/(?<channel>\w+)$ {
        add_header X-Server-Time $time_iso8601 always;
        add_header X-User-Agent $http_user_agent always;
        add_header X-Origin $http_origin always;
        add_header X-Client-Country $http_cf_ipcountry always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        js_content nchan_meta.publish;
    }

    location ~ ^/internal/publish/lobby/(?<channel>\w+)$ {
        internal;
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 0;
        default_type application/json;
    }

    # Publisher endpoint presence
    location = /publish/status/lobby {
        add_header X-Server-Time $time_iso8601 always;
        add_header X-User-Agent $http_user_agent always;
        add_header X-Origin $http_origin always;
        add_header X-Client-Country $http_cf_ipcountry always;
        add_header Vary Origin always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
        js_content nchan_meta.publish;
    }

    location = /internal/publish/status/lobby {
        internal;
        nchan_publisher;
        nchan_channel_id "status/lobby";
        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        default_type application/json;
    }

    # Subscriber endpoint table
    location ~ ^/subscribe/table/(?<tableId>\w+)$ {
        access_log /var/log/nginx/access.log main;
        nchan_subscriber;
        nchan_channel_id $tableId;
        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;

        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
    }

    # Subscriber endpoint lobby
    location ~ ^/subscribe/lobby/(?<channel>\w+)$ {
        access_log /var/log/nginx/access.log main;
        nchan_subscriber;
        nchan_channel_id $channel;
        nchan_message_buffer_length 0;
        nchan_message_timeout 0;
        nchan_subscriber_timeout 0;

        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
    }

    # Subscriber endpoint presence
    location = /subscribe/status/lobby {
        access_log /var/log/nginx/access.log main;
        nchan_subscriber;
        nchan_channel_id "status/lobby";
        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;

        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
    }

    # Legacy Presence Publisher Support
    location ~ ^/publish/presence/(?<channel>\w+)$ {
        nchan_publisher;
        nchan_channel_id $channel;
        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        default_type application/json;

        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Legacy Presence Subscriber Support
    location ~ ^/subscribe/presence/(?<channel>\w+)$ {
        access_log /var/log/nginx/access.log main;
        nchan_subscriber;
        nchan_channel_id $channel;
        nchan_message_buffer_length 2000;
        nchan_message_timeout 90s;
        nchan_subscriber_first_message oldest;
        nchan_subscriber_timeout 0;

        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
    }

    # Basic status monitoring
    location = /basic_status {
        stub_status;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Extended stats
    location /nchan_stats {
        nchan_stub_status;
        nchan_access_control_allow_origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Aggregated Stats API
    location = /api/stats {
        js_content nchan_meta.stats;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, Content-Type, Authorization" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Serve static files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
