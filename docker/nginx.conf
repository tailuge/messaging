# Load dynamic modules (must be before http block)
load_module /etc/nginx/modules/ngx_http_js_module.so;
load_module /etc/nginx/modules/ngx_nchan_module.so;

worker_processes auto;
error_log /var/log/nginx/error.log info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" ' 
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Nchan shared memory configuration
    nchan_shared_memory_size 128M;

    # NJS module
    # Move shared dict zone to the top of the NJS configuration
    # Increase size to 1M to ensure it's sufficient for multi-worker environments
    js_shared_dict_zone zone=ip_cache:1M type=string;
    js_import nchan_meta from /etc/nginx/nchan_meta.js;
    # Required for ngx.fetch DNS resolution inside NJS
    # Prefer public resolvers to avoid LAN DNS outages/timeouts
    resolver 1.1.1.1 8.8.8.8 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;
    js_fetch_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Include configs
    include /etc/nginx/conf.d/*.conf;
}
