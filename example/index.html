<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messaging Workbench</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: sans-serif; }
        .pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #ddd; }
        .header { background: #333; color: #fff; padding: 0.1rem; text-align: center; font-weight: bold; }
        iframe { flex: 1; border: 1px; border-radius: 4px;}
    </style>
</head>
<body>
    <div class="pane">
        <div class="header">Client A (Alice)</div>
        <iframe src="client.html?id=alice&name=Alice"></iframe>
    </div>
    <div class="pane">
        <div class="header">Client B (Bob)</div>
        <iframe src="client.html?id=bob&name=Bob"></iframe>
    </div>
    <div class="pane">
        <div class="header">Client C (Cline)</div>
        <iframe src="client.html?id=cline&name=Cline"></iframe>
    </div>

    <script>
        function hideThirdPaneOnMobile() {
            if (window.matchMedia("(orientation: portrait)").matches) {
                document.querySelector(".pane:last-child").remove();
            }
        }
        hideThirdPaneOnMobile();

        // Check if Nchan is reachable
        async function checkNchan() {
            try {
                // Use current protocol (http or https)
                const protocol = window.location.protocol;
                const res = await fetch(protocol + "//" + window.location.host + "/health");
                if (!res.ok) throw new Error();
            } catch (e) {
                console.warn("Nchan server check failed:", e);
                // alert("Nchan server not detected. Please ensure nchan is running.");
            }
        }
        checkNchan();
    </script>
</body>
</html>
