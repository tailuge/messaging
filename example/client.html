<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messaging Client</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <script defer src="client.js"></script>
    <style>
        html, body { height: 100%; margin: 0; }
        body { font-family: sans-serif; padding: 0.25rem; background: #f9f9f9; color: #333; display: flex; flex-direction: column; box-sizing: border-box; }
        .card { background: #fff; padding: 0.15rem 0.25rem; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 0.25rem; overflow-y: auto; min-height: 0; }
        .user-list { list-style: none; padding: 0; }
        .user-item { padding: 0.1rem 0.25rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .user-item.me { font-weight: bold; color: #007bff; }
        .status { font-size: 0.4rem; color: #666; }
        .form { margin-top: 0.25rem; display: flex; gap: 0.5rem; }
        .challenge-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: none; }
        .game-box { background: #d4edda; border: 1px solid #c3e6cb; padding: 0.15rem 0.25rem; border-radius: 8px; margin-bottom: 0; display: none; flex-direction: column; flex: 1; min-height: 0; }
        .game-box strong { font-size: 0.8rem; margin-right: 0.25rem; }
        .game-box #game-text { font-size: 0.65rem; display: inline; }
        .seek-box { background: #e2e3e5; border: 1px solid #d6d8db; padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 0.5rem; display: none; }
        button { cursor: pointer; padding: 0.15rem 0.4rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; }
        button:hover { background: #eee; }
        .btn-challenge { background: #007bff; color: white; border: none; }
        .btn-spectate { background: #fd7e14; color: white; border: none; }
        .btn-join { background: #17a2b8; color: white; border: none; }
        .btn-accept { background: #28a745; color: white; border: none; }
        .btn-decline { background: #dc3545; color: white; border: none; }
        .btn-seek { background: #6f42c1; color: white; border: none; }
        .btn-connect { background: #28a745; color: white; border: none; }
        .btn-disconnect { background: #6c757d; color: white; border: none; }
        .connection-status { font-weight: bold; font-size: 0.8rem; }
        .connection-status.online { color: #28a745; }
        .connection-status.offline { color: #dc3545; }
        #game-iframe { width: 100%; flex: 1; border: none; }
        h3 { margin: 0.02rem 0; font-size: 0.9rem; }
        hr { margin: 0.02rem 0; }
    </style>
</head>
<body>
    <div style="display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.25rem;">
        <span id="conn-status" class="connection-status offline">OFFLINE</span>
        <button id="btn-connect" class="btn-connect" onclick="connect()">Connect</button>
        <button id="btn-disconnect" class="btn-disconnect" onclick="disconnect()" style="display:none;">Disconnect</button>
        <button onclick="consoleUsers()" title="Log users to console" style="padding: 2px 6px; font-size: 12px;">👁</button>
    </div>

    <div id="seek-container" class="seek-box">
        <strong>Currently Seeking...</strong>
        <div>Looking for an opponent to join your table.</div>
        <button onclick="cancelSeek()">Cancel Seek</button>
    </div>

    <div id="challenge-container" class="challenge-box">
        <strong>Incoming Challenge!</strong>
        <div id="challenge-text"></div>
        <div class="form">
            <button class="btn-accept" id="btn-accept">Accept</button>
            <button class="btn-decline" id="btn-decline">Decline</button>
        </div>
    </div>

    <div class="card">
        <h3 id="my-name">Connecting...</h3>
        <div>
            <span id="count" class="status">Online Users: 0</span>
        </div>
        <hr>
        <div class="form" style="margin-bottom: 1rem;">
            <button id="btn-find-game" class="btn-seek" onclick="findGame()">Find Game (Seek)</button>
        </div>
        <ul id="user-list" class="user-list"></ul>
        
        <div class="form">
            <input type="text" id="name-input" placeholder="New Name" style="padding: 0.1rem;">
            <button onclick="updateName()">update</button>
        </div>
    </div>

    <div id="game-container" class="game-box">
        <strong>In Game</strong>
        <span id="game-text"></span>
        <iframe id="game-iframe"></iframe>
        <button onclick="leaveGame()">Leave Game</button>
    </div>
</body>
</html>
